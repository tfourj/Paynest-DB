name: paynest-db

services:
  pocketbase:
    image: ghcr.io/tfourj/paynest-db:latest
    container_name: paynest-pocketbase
    restart: unless-stopped
    ports:
      - "${POCKETBASE_PORT:-8080}:8080"
    volumes:
      - pocketbase-data:/pb/pb_data
      - pocketbase-hooks:/pb/pb_hooks

volumes:
  pocketbase-data:
  pocketbase-hooks:
